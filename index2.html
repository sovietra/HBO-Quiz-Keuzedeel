<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBO QUIZ - Sectie 2</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>

    <div class="wrapper">
        <div class="container">
            <img src="images/background-2.png" class="background">
            <img src="images/foreground.png" class="foreground">
            <h1>HBO QUIZ</h1>
            <h3>Sectie 2: Beveiliging</h3>
            <button class="scroll-btn" onclick="document.querySelector('.wrapper').scrollTo({top: window.innerHeight, behavior: 'smooth'})">Begin Sectie 2 ↓</button>
        </div>

        <section class="quiz-section">
            <div class="quiz-container">
                <div class="quiz-header">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <span class="question-counter" id="questionCounter">Vraag 1 / 4</span>
                </div>

                <div class="question-card" id="questionCard">
                    <div class="section-label" id="sectionLabel"></div>
                    <h2 class="question-text" id="questionText"></h2>
                    <div class="answers-grid" id="answersGrid"></div>
                    <div class="feedback" id="feedback"></div>
                    <button class="btn-next" id="nextBtn">Volgende vraag →</button>
                </div>

                <div class="results" id="results">
                    <h2>Sectie 2 Voltooid!</h2>
                    <div id="scoreDisplay"></div>
                    <div class="results-actions">
                        <button class="btn-restart" onclick="restartQuiz()">Opnieuw spelen</button>
                        <a href="index.html" class="btn-next-section">← Terug naar Sectie 1</a>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script src="script2.js"></script>
</body>
</html>
